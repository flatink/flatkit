name: CI

# Branches and PRs run THE GATE (gate.yml). `main` is owned by release.yml (which runs the same gate before
# publishing), and `changeset-release/main` is a staging branch already gated when the change hit main — both
# are excluded here so the gate never runs twice for the same change.
on:
  push:
    branches-ignore: [main, changeset-release/main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    uses: ./.github/workflows/gate.yml
