name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04 # pinned (not -latest) so the runner image can't shift under us
    # Third-party actions are pinned to a full commit SHA (supply-chain hardening): a moved tag can no
    # longer swap the code we run. The trailing comment tracks the human-readable version; Dependabot
    # (.github/dependabot.yml) bumps both the SHA and the comment together.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # no git push from CI -> do not leave the token in .git/config

      # pnpm before setup-node so the node cache can use the pnpm store.
      # The version is read from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      # Optional deps (skia-canvas, native, debug-only --render) are left to pnpm's
      # build-script allowlist: their binaries do not build in CI, so the --render test
      # self-skips. Everything else installs deterministically from the lockfile.
      - name: Install
        run: pnpm install --frozen-lockfile

      # Fail the build on a known HIGH/critical advisory in the dependency tree.
      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm run lint

      - name: English-only guard
        run: pnpm run check:english

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      # Build every package to dist/ and lint the would-be-published tarballs (publint + are-the-types-wrong).
      - name: Build & publishability
        run: pnpm run check:pack

      # Smoke-test the wired CLI binary end to end.
      - name: flatc CLI smoke
        run: node packages/compiler/bin/flatc.mjs --help
