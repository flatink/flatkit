name: Release

# On every push to main: run THE GATE (gate.yml, same as CI), then either STAGE a version bump or PUBLISH.
#  - changesets pending  → `changeset version` bumps + writes CHANGELOGs, pushed to `changeset-release/main`
#    with NO pull request (the zwykstudio org blocks Actions from opening PRs — that failing PR step was the
#    systematic red ✗). The maintainer fast-forwards main onto that branch to trigger the publish run.
#  - no changesets pending → versions are final (main was fast-forwarded) → publish to npm.
# The publish job `needs:` the gate, so a red build never reaches npm — which a separate ci.yml run could not
# enforce on the publish job.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # The SAME gate as CI (single definition in gate.yml), run once for this push.
  gate:
    uses: ./.github/workflows/gate.yml

  release:
    needs: gate # never stage or publish unless the gate is green
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the staged bump branch + publish tags / GitHub releases
      id-token: write # npm provenance (OIDC)
    # Third-party actions pinned to a commit SHA (see gate.yml); Dependabot keeps them current.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # credentials persisted (default) so the "Stage version bump" step can push changeset-release/main

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pending changesets?
        id: cs
        run: |
          if find .changeset -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      # PENDING → stage the bump on `changeset-release/main` WITHOUT a PR. `check:english` re-runs because the
      # CHANGELOGs are generated HERE (the gate ran before they existed) — a non-ASCII changeset summary is
      # caught now instead of after publish.
      - name: Stage version bump (no PR)
        if: steps.cs.outputs.pending == 'true'
        run: |
          pnpm changeset version
          pnpm run check:english
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B changeset-release/main
          git add -A
          git commit -m "Version Packages"
          git push -f origin changeset-release/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NO pending changesets → publish. In publish mode the changesets action does NOT open a PR (so it
      # succeeds cleanly); it publishes only versions not already on npm (idempotent), tags them, and creates
      # the GitHub releases with npm provenance.
      - name: Publish to npm
        if: steps.cs.outputs.pending == 'false'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
