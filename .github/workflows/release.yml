name: Release

# On every push to main: run THE GATE (gate.yml, same as CI), then hand off to the changesets action.
#  - changesets pending  → it runs `version-packages` (bumps + writes CHANGELOGs) and opens/updates the
#    "Version Packages" PR. Review + merge that PR to cut the release.
#  - no changesets pending (the Version Packages PR was just merged) → it PUBLISHES to npm (idempotent),
#    tags the versions, and creates the GitHub releases with npm provenance.
# The release job `needs:` the gate, so a red build never reaches npm — which a separate ci.yml run could
# not enforce on the publish job.
#
# NOTE: the "Version Packages" PR is opened with GITHUB_TOKEN, so it does NOT itself trigger CI (GitHub's
# anti-recursion rule). That's fine: the gate already ran on the push that created/updated it, and runs
# again on the merge commit before publish — so the green-gate-before-npm guarantee holds either way.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # The SAME gate as CI (single definition in gate.yml), run once for this push.
  gate:
    uses: ./.github/workflows/gate.yml

  release:
    needs: gate # never open the version PR or publish unless the gate is green
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the version branch, create tags / GitHub releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm provenance (OIDC)
    # Third-party actions pinned to a commit SHA (see gate.yml); Dependabot keeps them current.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      # Pending changesets → open/update the "Version Packages" PR (runs `changeset version`, which
      # generates the CHANGELOGs — so a non-ASCII summary surfaces here / at merge, caught by the gate
      # before publish). None pending → `pnpm release` builds and publishes only versions not yet on npm.
      - name: Version PR / Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm run version-packages
          publish: pnpm release
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
